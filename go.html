<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หมากล้อม (Go) - เล่นออนไลน์</title>
<link rel="stylesheet" href="s.css">
<style>
  section#game {
    max-width: 1000px;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 10px;
    color: #f0f0f0;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    background-color: #111;
    padding: 15px;
    border-radius: 4px;
    margin-bottom: 20px;
  }
  .controls label {
    font-size: 14px;
  }
  .controls select, .controls button {
    background-color: #333;
    color: #f0f0f0;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 14px;
  }
  .controls button:hover, .controls select:hover {
    background-color: #444;
  }
  .game-layout {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    align-items: flex-start;
  }
  #board {
    background-color: #dcb35c;
    border-radius: 4px;
    touch-action: none;
    max-width: 100%;
  }
  .info-panel {
    background-color: #111;
    padding: 16px;
    border-radius: 4px;
    min-width: 220px;
    flex: 1;
  }
  .info-panel h3 {
    margin-bottom: 10px;
    font-size: 18px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid #333;
    font-size: 15px;
  }
  .stone-dot {
    display: inline-block;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .black-dot { background: #111; border: 1px solid #888; }
  .white-dot { background: #f0f0f0; }
  #status {
    margin-top: 12px;
    font-weight: bold;
    min-height: 24px;
  }
  #turnIndicator.active {
    color: #ffd166;
  }
</style>
</head>
<body>
  <header>
    <nav>
      <div class="logo">Your IT Company</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="go.html">หมากล้อม (Go)</a></li>
      </ul>
    </nav>
  </header>

  <section id="game">
    <a class="back-link" href="index.html">&larr; กลับหน้าแรก</a>
    <h2>หมากล้อม (Go)</h2>
    <p>เกมกระดานคลาสสิก ล้อมพื้นที่และจับกินหมากฝ่ายตรงข้าม คลิกที่จุดตัดบนกระดานเพื่อวางหมาก</p>

    <div class="controls">
      <label>ขนาดกระดาน:
        <select id="boardSize">
          <option value="9">9x9</option>
          <option value="13">13x13</option>
          <option value="19">19x19</option>
        </select>
      </label>
      <label>คู่ต่อสู้:
        <select id="opponent">
          <option value="human">คน vs คน</option>
          <option value="ai">คน vs คอมพิวเตอร์</option>
        </select>
      </label>
      <button id="newGameBtn">เริ่มเกมใหม่</button>
      <button id="passBtn">ยกเว้นตา (Pass)</button>
      <button id="undoBtn">ย้อนกลับ</button>
    </div>

    <div class="game-layout">
      <canvas id="board" width="640" height="640"></canvas>

      <div class="info-panel">
        <h3>สถานะเกม</h3>
        <div class="info-row" id="turnIndicator">
          <span><span class="stone-dot black-dot"></span>ตาปัจจุบัน</span>
          <span id="turnText">ดำ</span>
        </div>
        <div class="info-row">
          <span><span class="stone-dot black-dot"></span>ดำ จับได้</span>
          <span id="blackCaptures">0</span>
        </div>
        <div class="info-row">
          <span><span class="stone-dot white-dot"></span>ขาว จับได้</span>
          <span id="whiteCaptures">0</span>
        </div>
        <div id="status"></div>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2023 Your IT Company. All rights reserved.</p>
  </footer>

<script>
(function () {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const boardSizeSelect = document.getElementById('boardSize');
  const opponentSelect = document.getElementById('opponent');
  const newGameBtn = document.getElementById('newGameBtn');
  const passBtn = document.getElementById('passBtn');
  const undoBtn = document.getElementById('undoBtn');
  const turnText = document.getElementById('turnText');
  const turnIndicator = document.getElementById('turnIndicator');
  const blackCapturesEl = document.getElementById('blackCaptures');
  const whiteCapturesEl = document.getElementById('whiteCaptures');
  const statusEl = document.getElementById('status');

  const EMPTY = 0, BLACK = 1, WHITE = 2;

  let N = 9;
  let cell = 0;
  let margin = 0;
  let board = [];
  let turn = BLACK;
  let captures = { 1: 0, 2: 0 };
  let passCount = 0;
  let gameOver = false;
  let history = []; // snapshots for undo: {board, turn, captures, passCount}
  let koBoardString = null; // board state string right before opponent's last move (for simple ko)

  function idx(x, y) { return y * N + x; }

  function newBoard(n) {
    return new Array(n * n).fill(EMPTY);
  }

  function boardKey(b) {
    return b.join('');
  }

  function inBounds(x, y) {
    return x >= 0 && x < N && y >= 0 && y < N;
  }

  function neighbors(x, y) {
    const result = [];
    if (x > 0) result.push([x - 1, y]);
    if (x < N - 1) result.push([x + 1, y]);
    if (y > 0) result.push([x, y - 1]);
    if (y < N - 1) result.push([x, y + 1]);
    return result;
  }

  function getGroup(b, x, y) {
    const color = b[idx(x, y)];
    const stack = [[x, y]];
    const seen = new Set([idx(x, y)]);
    const stones = [];
    const liberties = new Set();
    while (stack.length) {
      const [cx, cy] = stack.pop();
      stones.push([cx, cy]);
      for (const [nx, ny] of neighbors(cx, cy)) {
        const nColor = b[idx(nx, ny)];
        if (nColor === EMPTY) {
          liberties.add(idx(nx, ny));
        } else if (nColor === color && !seen.has(idx(nx, ny))) {
          seen.add(idx(nx, ny));
          stack.push([nx, ny]);
        }
      }
    }
    return { stones, liberties, color };
  }

  // Attempts a move; returns {ok, board, captured} without mutating global state
  function tryMove(b, x, y, color) {
    if (b[idx(x, y)] !== EMPTY) return { ok: false };
    const nb = b.slice();
    nb[idx(x, y)] = color;
    const opponent = color === BLACK ? WHITE : BLACK;
    let capturedCount = 0;
    const visitedGroups = new Set();

    for (const [nx, ny] of neighbors(x, y)) {
      const key = idx(nx, ny);
      if (nb[key] === opponent && !visitedGroups.has(key)) {
        const group = getGroup(nb, nx, ny);
        group.stones.forEach(([gx, gy]) => visitedGroups.add(idx(gx, gy)));
        if (group.liberties.size === 0) {
          group.stones.forEach(([gx, gy]) => { nb[idx(gx, gy)] = EMPTY; });
          capturedCount += group.stones.length;
        }
      }
    }

    // check own group for suicide
    const ownGroup = getGroup(nb, x, y);
    if (ownGroup.liberties.size === 0) {
      return { ok: false }; // suicide, illegal
    }

    return { ok: true, board: nb, captured: capturedCount };
  }

  function legalMoves(b, color, koKey) {
    const moves = [];
    for (let y = 0; y < N; y++) {
      for (let x = 0; x < N; x++) {
        if (b[idx(x, y)] !== EMPTY) continue;
        const res = tryMove(b, x, y, color);
        if (res.ok && boardKey(res.board) !== koKey) {
          moves.push([x, y]);
        }
      }
    }
    return moves;
  }

  function saveHistory() {
    history.push({
      board: board.slice(),
      turn,
      captures: { ...captures },
      passCount,
    });
  }

  function placeStone(x, y) {
    if (gameOver) return false;
    const res = tryMove(board, x, y, turn);
    if (!res.ok) return false;
    if (koBoardString !== null && boardKey(res.board) === koBoardString) {
      statusEl.textContent = 'ผิดกฎโค (Ko) ห้ามเดินซ้ำตำแหน่งเดิม';
      return false;
    }

    saveHistory();
    koBoardString = boardKey(board);
    board = res.board;
    captures[turn] += res.captured;
    passCount = 0;
    turn = turn === BLACK ? WHITE : BLACK;
    statusEl.textContent = '';
    draw();
    maybeAiMove();
    return true;
  }

  function passTurn() {
    if (gameOver) return;
    saveHistory();
    passCount++;
    turn = turn === BLACK ? WHITE : BLACK;
    if (passCount >= 2) {
      endGame();
    } else {
      draw();
      maybeAiMove();
    }
  }

  function undo() {
    if (history.length === 0) return;
    const steps = (opponentSelect.value === 'ai' && history.length >= 2) ? 2 : 1;
    for (let i = 0; i < steps; i++) {
      const prev = history.pop();
      if (prev) {
        board = prev.board;
        turn = prev.turn;
        captures = prev.captures;
        passCount = prev.passCount;
      }
    }
    gameOver = false;
    koBoardString = null;
    statusEl.textContent = '';
    draw();
  }

  function scoreArea(b) {
    const visited = new Array(b.length).fill(false);
    const score = { 1: 0, 2: 0 };
    for (let i = 0; i < b.length; i++) {
      if (b[i] === BLACK) score[1]++;
      else if (b[i] === WHITE) score[2]++;
    }
    for (let y = 0; y < N; y++) {
      for (let x = 0; x < N; x++) {
        const i = idx(x, y);
        if (b[i] !== EMPTY || visited[i]) continue;
        const stack = [[x, y]];
        visited[i] = true;
        const region = [[x, y]];
        const borders = new Set();
        while (stack.length) {
          const [cx, cy] = stack.pop();
          for (const [nx, ny] of neighbors(cx, cy)) {
            const ni = idx(nx, ny);
            if (b[ni] === EMPTY) {
              if (!visited[ni]) {
                visited[ni] = true;
                stack.push([nx, ny]);
                region.push([nx, ny]);
              }
            } else {
              borders.add(b[ni]);
            }
          }
        }
        if (borders.size === 1) {
          const owner = [...borders][0];
          score[owner] += region.length;
        }
      }
    }
    return score;
  }

  function endGame() {
    gameOver = true;
    const score = scoreArea(board);
    let msg;
    if (score[1] > score[2]) msg = `จบเกม! ดำชนะ ${score[1]} - ${score[2]}`;
    else if (score[2] > score[1]) msg = `จบเกม! ขาวชนะ ${score[2]} - ${score[1]}`;
    else msg = `จบเกม! เสมอ ${score[1]} - ${score[2]}`;
    statusEl.textContent = msg;
    draw();
  }

  function isLikelyEye(b, x, y, color) {
    for (const [nx, ny] of neighbors(x, y)) {
      if (b[idx(nx, ny)] !== color) return false;
    }
    const diagonals = [[x - 1, y - 1], [x + 1, y - 1], [x - 1, y + 1], [x + 1, y + 1]];
    let onBoardDiag = 0, colorDiag = 0;
    diagonals.forEach(([dx, dy]) => {
      if (inBounds(dx, dy)) {
        onBoardDiag++;
        if (b[idx(dx, dy)] === color) colorDiag++;
      }
    });
    if (onBoardDiag < 4) return colorDiag === onBoardDiag;
    return colorDiag >= 3;
  }

  function scoreAiMove(x, y, stoneCoords, totalStones, starPoints) {
    const res = tryMove(board, x, y, WHITE);
    let score = res.captured * 120;

    // avoid leaving the new stone's own group short on liberties
    const ownGroup = getGroup(res.board, x, y);
    if (ownGroup.liberties.size === 1) score -= 60;
    else if (ownGroup.liberties.size === 2) score -= 10;

    // rescue a friendly group that is currently in atari
    for (const [nx, ny] of neighbors(x, y)) {
      if (board[idx(nx, ny)] === WHITE) {
        const g = getGroup(board, nx, ny);
        if (g.liberties.size === 1) score += 70;
      }
    }

    // reward putting opponent groups in atari (bigger groups are juicier)
    const seen = new Set();
    for (const [nx, ny] of neighbors(x, y)) {
      if (res.board[idx(nx, ny)] === BLACK) {
        const key = idx(nx, ny);
        if (seen.has(key)) continue;
        const g = getGroup(res.board, nx, ny);
        g.stones.forEach(([gx, gy]) => seen.add(idx(gx, gy)));
        if (g.liberties.size === 1) score += 45 + g.stones.length * 8;
        else if (g.liberties.size === 2) score += 10;
      }
    }

    // prefer moves near existing action over scattered isolated plays
    let minDist = totalStones === 0 ? 0 : Infinity;
    for (const [sx, sy] of stoneCoords) {
      const d = Math.max(Math.abs(sx - x), Math.abs(sy - y));
      if (d < minDist) minDist = d;
    }
    score += Math.max(0, 6 - minDist) * 3;

    // opening heuristic: favor star points, avoid the first two lines early
    if (totalStones < N) {
      if (starPoints.some(([px, py]) => px === x && py === y)) score += 15;
      const distFromEdge = Math.min(x, y, N - 1 - x, N - 1 - y);
      if (distFromEdge === 0) score -= 15;
      else if (distFromEdge === 1) score -= 5;
    }

    score += Math.random() * 3;
    return score;
  }

  function maybeAiMove() {
    if (gameOver) return;
    if (opponentSelect.value !== 'ai' || turn !== WHITE) return;
    setTimeout(() => {
      if (gameOver) return;
      const allMoves = legalMoves(board, WHITE, koBoardString);
      if (allMoves.length === 0) {
        passTurn();
        return;
      }

      let candidates = allMoves.filter(([x, y]) => !isLikelyEye(board, x, y, WHITE));
      if (candidates.length === 0) candidates = allMoves;

      const stoneCoords = [];
      for (let y = 0; y < N; y++) {
        for (let x = 0; x < N; x++) {
          if (board[idx(x, y)] !== EMPTY) stoneCoords.push([x, y]);
        }
      }
      const totalStones = stoneCoords.length;
      const starPoints = getStarPoints(N);

      let best = null;
      let bestScore = -Infinity;
      for (const [x, y] of candidates) {
        const s = scoreAiMove(x, y, stoneCoords, totalStones, starPoints);
        if (s > bestScore) {
          bestScore = s;
          best = [x, y];
        }
      }
      placeStone(best[0], best[1]);
    }, 400);
  }

  function setupBoard() {
    N = parseInt(boardSizeSelect.value, 10);
    board = newBoard(N);
    turn = BLACK;
    captures = { 1: 0, 2: 0 };
    passCount = 0;
    gameOver = false;
    history = [];
    koBoardString = null;
    statusEl.textContent = '';
    resizeCanvas();
    draw();
  }

  function resizeCanvas() {
    const size = 640;
    canvas.width = size;
    canvas.height = size;
    margin = size / (N + 1);
    cell = (size - margin * 2) / (N - 1);
  }

  function boardToPixel(x, y) {
    return [margin + x * cell, margin + y * cell];
  }

  function pixelToBoard(px, py) {
    const x = Math.round((px - margin) / cell);
    const y = Math.round((py - margin) / cell);
    return [x, y];
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#dcb35c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    for (let i = 0; i < N; i++) {
      const [x0, y0] = boardToPixel(i, 0);
      const [x1, y1] = boardToPixel(i, N - 1);
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.stroke();

      const [xa, ya] = boardToPixel(0, i);
      const [xb, yb] = boardToPixel(N - 1, i);
      ctx.beginPath();
      ctx.moveTo(xa, ya);
      ctx.lineTo(xb, yb);
      ctx.stroke();
    }

    // star points
    const starPoints = getStarPoints(N);
    ctx.fillStyle = '#333';
    starPoints.forEach(([sx, sy]) => {
      const [px, py] = boardToPixel(sx, sy);
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fill();
    });

    // stones
    for (let y = 0; y < N; y++) {
      for (let x = 0; x < N; x++) {
        const v = board[idx(x, y)];
        if (v === EMPTY) continue;
        const [px, py] = boardToPixel(x, y);
        const r = cell * 0.46;
        const grad = ctx.createRadialGradient(px - r * 0.3, py - r * 0.3, r * 0.1, px, py, r);
        if (v === BLACK) {
          grad.addColorStop(0, '#555');
          grad.addColorStop(1, '#000');
        } else {
          grad.addColorStop(0, '#fff');
          grad.addColorStop(1, '#ccc');
        }
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(px, py, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    turnText.textContent = turn === BLACK ? 'ดำ' : 'ขาว';
    turnIndicator.classList.toggle('active', true);
    blackCapturesEl.textContent = captures[1];
    whiteCapturesEl.textContent = captures[2];
  }

  function getStarPoints(n) {
    if (n === 9) return [[2,2],[6,2],[4,4],[2,6],[6,6]];
    if (n === 13) return [[3,3],[9,3],[6,6],[3,9],[9,9]];
    if (n === 19) return [[3,3],[9,3],[15,3],[3,9],[9,9],[15,9],[3,15],[9,15],[15,15]];
    return [];
  }

  canvas.addEventListener('click', (e) => {
    if (gameOver) return;
    if (opponentSelect.value === 'ai' && turn === WHITE) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const px = (e.clientX - rect.left) * scaleX;
    const py = (e.clientY - rect.top) * scaleY;
    const [x, y] = pixelToBoard(px, py);
    if (!inBounds(x, y)) return;
    const [bx, by] = boardToPixel(x, y);
    const dist = Math.hypot(px - bx, py - by);
    if (dist > cell * 0.5) return;
    placeStone(x, y);
  });

  newGameBtn.addEventListener('click', setupBoard);
  boardSizeSelect.addEventListener('change', setupBoard);
  opponentSelect.addEventListener('change', setupBoard);
  passBtn.addEventListener('click', passTurn);
  undoBtn.addEventListener('click', undo);

  setupBoard();
})();
</script>
</body>
</html>
